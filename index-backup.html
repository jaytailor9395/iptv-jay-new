<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ULTIMATE IPTV PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

:root{
--bg:#020617;
--card:rgba(15,23,42,.92);
--line:rgba(255,255,255,.08);
--blue:#3b82f6;
--cyan:#06b6d4;
}

body{
background:
radial-gradient(circle at top left,#1e3a8a,transparent 25%),
radial-gradient(circle at bottom right,#0f766e,transparent 25%),
linear-gradient(135deg,#020617,#0f172a,#111827);
color:white;
overflow:hidden;
}

/* LOADER */

#loader{
position:fixed;
inset:0;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
z-index:999999;
}

.spin{
width:70px;
height:70px;
border-radius:50%;
border:6px solid rgba(255,255,255,.1);
border-top:6px solid var(--blue);
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

/* APP */

.app{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:320px;
background:rgba(10,15,30,.88);
backdrop-filter:blur(20px);
border-right:1px solid var(--line);
display:flex;
flex-direction:column;
overflow:hidden;
}

.logo{
padding:30px 24px;
border-bottom:1px solid var(--line);
}

.logo h1{
font-size:30px;
font-weight:800;
background:linear-gradient(90deg,#60a5fa,#22d3ee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.logo p{
margin-top:6px;
font-size:13px;
color:#94a3b8;
}

.upload{
padding:20px;
}

.upload label{
height:58px;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2563eb,#06b6d4);
border-radius:18px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.upload label:hover{
transform:scale(1.02);
}

input[type=file]{
display:none;
}

.search-wrap{
padding:0 20px 20px;
}

.search,
.channel-search{
width:100%;
height:58px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:0 18px;
outline:none;
color:white;
font-size:14px;
transition:.3s;
}

.search:focus,
.channel-search:focus{
border-color:#3b82f6;
box-shadow:0 0 20px rgba(59,130,246,.25);
}

.country-list{
flex:1;
overflow:auto;
padding:0 15px 20px;
}

.country{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
margin-bottom:10px;
border-radius:18px;
background:rgba(255,255,255,.03);
cursor:pointer;
transition:.3s;
}

.country:hover{
background:rgba(255,255,255,.06);
transform:translateX(4px);
}

.country-left{
display:flex;
align-items:center;
gap:12px;
}

.badge{
background:#1e293b;
padding:6px 12px;
border-radius:999px;
font-size:11px;
}

/* MAIN */

.main{
flex:1;
padding:28px;
overflow:auto;
}

.topbar{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:25px;
}

.stat{
background:var(--card);
border:1px solid var(--line);
padding:24px;
border-radius:28px;
backdrop-filter:blur(12px);
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.stat span{
font-size:13px;
color:#94a3b8;
}

.stat h1{
font-size:40px;
margin-top:10px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:24px;
}

/* CARD */

.card{
background:linear-gradient(180deg,rgba(17,24,39,.92),rgba(15,23,42,.88));
border:1px solid rgba(255,255,255,.06);
border-radius:30px;
overflow:hidden;
position:relative;
transition:.35s;
backdrop-filter:blur(16px);
}

.card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:
0 30px 60px rgba(0,0,0,.55),
0 0 30px rgba(59,130,246,.2);
}

/* LIVE */

.live{
position:absolute;
top:14px;
left:14px;
background:linear-gradient(135deg,#ff0000,#ff4d4d);
padding:7px 14px;
border-radius:999px;
font-size:11px;
font-weight:700;
letter-spacing:1px;
z-index:5;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{
transform:scale(1);
}
50%{
transform:scale(1.08);
}
100%{
transform:scale(1);
}
}

/* THUMB */

.thumb{
height:190px;
background:
linear-gradient(135deg,#111827,#1e293b);
background-size:cover;
background-position:center;
position:relative;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.thumb::before{
content:'📺 IPTV';
position:absolute;
z-index:2;
font-size:34px;
font-weight:800;
letter-spacing:2px;
background:linear-gradient(90deg,#60a5fa,#22d3ee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 25px rgba(59,130,246,.5);
}

.thumb::after{
content:'';
position:absolute;
inset:0;
background:
linear-gradient(to top,rgba(0,0,0,.85),transparent 60%),
radial-gradient(circle at top right,rgba(59,130,246,.25),transparent 40%);
}

/* CONTENT */

.content{
padding:20px;
}

.name{
font-size:15px;
font-weight:600;
line-height:1.5;
height:50px;
overflow:hidden;
}

.tag{
display:inline-flex;
padding:7px 14px;
border-radius:999px;
background:rgba(255,255,255,.06);
font-size:11px;
margin-top:12px;
}

/* ACTIONS */

.actions{
display:flex;
gap:10px;
margin-top:18px;
}

.btn{
flex:1;
height:46px;
border:none;
border-radius:16px;
font-weight:700;
cursor:pointer;
color:white;
transition:.25s;
}

.btn:hover{
transform:translateY(-2px);
filter:brightness(1.08);
}

.btn:active{
transform:scale(.95);
}

.play{
background:linear-gradient(135deg,#16a34a,#22c55e);
}

.fav{
background:linear-gradient(135deg,#dc2626,#ef4444);
}

.copy{
background:linear-gradient(135deg,#2563eb,#3b82f6);
}

/* PLAYER */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
backdrop-filter:blur(12px);
}

.player-box{
width:88%;
max-width:1450px;
position:relative;
}

video{
width:100%;
border-radius:28px;
background:black;
}

.close{
position:absolute;
top:-65px;
right:0;
padding:14px 22px;
border:none;
border-radius:16px;
background:#ef4444;
color:white;
font-weight:700;
cursor:pointer;
}

.now{
position:absolute;
top:18px;
left:18px;
padding:12px 16px;
background:rgba(0,0,0,.6);
border-radius:16px;
z-index:10;
}

/* FLOAT PLAYER */

.float-player{
position:fixed;
bottom:20px;
right:20px;
width:320px;
background:#111827;
border-radius:22px;
overflow:hidden;
display:none;
z-index:99999;
box-shadow:0 20px 50px rgba(0,0,0,.5);
}

.float-top{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
font-size:13px;
background:#0f172a;
}

/* TOAST */

.toast{
position:fixed;
bottom:30px;
right:30px;
background:#2563eb;
padding:14px 22px;
border-radius:14px;
font-weight:600;
z-index:999999;
animation:fade .3s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* SCROLL */

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{
background:linear-gradient(180deg,#3b82f6,#06b6d4);
border-radius:999px;
}

/* MOBILE */

@media(max-width:1500px){
.grid{
grid-template-columns:repeat(4,1fr);
}
}

@media(max-width:1200px){
.grid{
grid-template-columns:repeat(3,1fr);
}
}

@media(max-width:850px){

.app{
flex-direction:column;
}

.sidebar{
width:100%;
height:360px;
}

.grid{
grid-template-columns:repeat(2,1fr);
}

.topbar{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:650px){

.grid{
grid-template-columns:1fr;
}

.topbar{
grid-template-columns:1fr;
}

.float-player{
width:94%;
right:3%;
}

.player-box{
width:96%;
}

}

</style>
</head>

<body>

<div id="loader">
<div class="spin"></div>
</div>

<div class="app">

<div class="sidebar">

<div class="logo">
<h1>ULTIMATE IPTV</h1>
<p>Premium OTT Streaming Dashboard</p>
</div>

<div class="upload">
<label>
UPLOAD JSON
<input type="file" id="jsonFile" accept=".json">
</label>
</div>

<div class="search-wrap">
<input type="text" class="search" id="countrySearch" placeholder="Search Country...">
</div>

<div class="country-list" id="countryList"></div>

</div>

<div class="main">

<div class="topbar">

<div class="stat">
<span>Total Channels</span>
<h1 id="totalChannels">0</h1>
</div>

<div class="stat">
<span>Total Countries</span>
<h1 id="totalCountries">0</h1>
</div>

<div class="stat">
<span>Favorites</span>
<h1 id="favoriteCount">0</h1>
</div>

<div class="stat">
<span>Recent Played</span>
<h1 id="recentCount">0</h1>
</div>

</div>

<input
type="text"
class="channel-search"
id="channelSearch"
placeholder="Search Channel...">

<br><br>

<div class="grid" id="grid"></div>

</div>

</div>

<div class="modal" id="modal">

<div class="player-box">

<div class="now" id="nowPlaying">
Now Playing
</div>

<button class="close" onclick="closePlayer()">
Close
</button>

<video id="video" controls autoplay></video>

</div>

</div>

<div class="float-player" id="floatPlayer">

<div class="float-top">

<span id="floatTitle">LIVE</span>

<button onclick="hideFloat()" style="
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
">
✕
</button>

</div>

<video id="floatVideo" controls muted autoplay></video>

</div>

<script>

let data = {};

fetch('./channels.json')
.then(res => res.json())
.then(json => {

data = json;

renderCountries();

updateStats();

toast('channels.json Auto Loaded');

})
.catch(err => {

console.log('channels.json not found');

});

let favorites =
JSON.parse(localStorage.getItem('favorites')) || [];

let recent =
JSON.parse(localStorage.getItem('recent')) || [];

let hls;
let floatHls;

const grid =
document.getElementById('grid');

/* LOADER */

window.onload = ()=>{

setTimeout(()=>{

document.getElementById('loader').style.display='none';

},1200);

};

/* TOAST */

function toast(msg){

const t =
document.createElement('div');

t.className='toast';

t.innerText=msg;

document.body.appendChild(t);

setTimeout(()=>{

t.remove();

},2500);

}

/* LOAD JSON */

document
.getElementById('jsonFile')
.addEventListener('change',e=>{

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = event=>{

try{

data = JSON.parse(event.target.result);

renderCountries();

updateStats();

toast('JSON Loaded Successfully');

}catch(err){

alert('Invalid JSON File');

}

};

reader.readAsText(file);

});

/* STATS */

function updateStats(){

let total = 0;

Object.keys(data).forEach(c=>{

total += data[c].length;

});

document.getElementById('totalChannels').innerText = total;

document.getElementById('totalCountries').innerText =
Object.keys(data).length;

document.getElementById('favoriteCount').innerText =
favorites.length;

document.getElementById('recentCount').innerText =
recent.length;

}

/* COUNTRIES */

function renderCountries(){

const list =
document.getElementById('countryList');

list.innerHTML='';

Object.keys(data).forEach(country=>{

const count =
data[country].length;

list.innerHTML += `

<div class="country">

<div class="country-left">

<input
type="checkbox"
onchange="toggleCountry('${country}',this.checked)">

<span>${country.toUpperCase()}</span>

</div>

<div class="badge">${count}</div>

</div>

`;

});

}

/* SEARCH COUNTRY */

document
.getElementById('countrySearch')
.addEventListener('input',function(){

const value =
this.value.toLowerCase();

document.querySelectorAll('.country')
.forEach(item=>{

item.style.display =
item.innerText.toLowerCase().includes(value)
? 'flex'
: 'none';

});

});

/* SEARCH CHANNEL */

document
.getElementById('channelSearch')
.addEventListener('input',function(){

const value =
this.value.toLowerCase();

document.querySelectorAll('.card')
.forEach(card=>{

const name =
card.querySelector('.name')
.innerText
.toLowerCase();

card.style.display =
name.includes(value)
? 'block'
: 'none';

});

});

/* CHANNELS */

function toggleCountry(country,checked){

if(!checked){

document
.querySelectorAll(`[data-country="${country}"]`)
.forEach(e=>e.remove());

return;

}

const fragment =
document.createDocumentFragment();

data[country].forEach(ch=>{

const card =
document.createElement('div');

card.className='card';

card.dataset.country=country;

card.innerHTML = `

<div class="live">LIVE</div>

<div
class="thumb"
style="
background-image:url('${ch.logo || ""}');
">
</div>

<div class="content">

<div class="name">
${ch.name}
</div>

<div class="tag">
${country.toUpperCase()}
</div>

<div class="actions">

<button
class="btn play"
onclick="playVideo('${ch.url}','${ch.name}')">
▶
</button>

<button
class="btn fav"
onclick="addFavorite('${ch.name}')">
❤
</button>

<button
class="btn copy"
onclick="copyLink('${ch.url}')">
⧉
</button>

</div>

</div>

`;

fragment.appendChild(card);

});

grid.appendChild(fragment);

}

/* PLAY */

function playVideo(url,name){

const modal =
document.getElementById('modal');

const video =
document.getElementById('video');

modal.style.display='flex';

document.getElementById('nowPlaying')
.innerText=name;

if(hls){

hls.destroy();

}

if(Hls.isSupported()){

hls = new Hls();

hls.loadSource(url);

hls.attachMedia(video);

}else{

video.src=url;

}

video.addEventListener('loadedmetadata',()=>{

if(video.requestFullscreen){

video.requestFullscreen();

}

});

showFloat(url,name);

recent.push(name);

localStorage.setItem(
'recent',
JSON.stringify(recent)
);

updateStats();

toast('Now Playing: ' + name);

}

/* CLOSE */

function closePlayer(){

const modal =
document.getElementById('modal');

const video =
document.getElementById('video');

modal.style.display='none';

video.pause();

video.removeAttribute('src');

video.load();

if(hls){

hls.destroy();

hls=null;

}

}

/* FLOAT */

function showFloat(url,name){

const box =
document.getElementById('floatPlayer');

const video =
document.getElementById('floatVideo');

document.getElementById('floatTitle')
.innerText=name;

box.style.display='block';

if(floatHls){

floatHls.destroy();

}

if(Hls.isSupported()){

floatHls = new Hls();

floatHls.loadSource(url);

floatHls.attachMedia(video);

}else{

video.src=url;

}

}

function hideFloat(){

document.getElementById('floatPlayer')
.style.display='none';

}

/* COPY */

function copyLink(link){

navigator.clipboard.writeText(link);

toast('Stream Link Copied');

}

/* FAVORITE */

function addFavorite(name){

if(!favorites.includes(name)){

favorites.push(name);

}

localStorage.setItem(
'favorites',
JSON.stringify(favorites)
);

updateStats();

toast('Added To Favorites');

}

/* ESC CLOSE */

document.addEventListener(
'keydown',
function(e){

if(e.key==='Escape'){

closePlayer();

}

});

</script>

</body>
</html>
